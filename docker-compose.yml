# ════════════════════════════════════════════════════════════
# BITVORA EXCHANGE — Docker Compose Production Stack
# 6 services: backend, redis, nginx, worker-verifier, worker-price, cloudflared
# ════════════════════════════════════════════════════════════

services:
  # ── FastAPI API Server ─────────────────────────────────────
  backend:
    build: ./backend
    image: bitvora-exchange-api
    container_name: bitvora-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - bitvora-network

  # ── Redis — Persistent Job Queue & Distributed Locks ───────
  redis:
    image: redis:7-alpine
    container_name: bitvora-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 640M
    networks:
      - bitvora-network

  # ── PostgreSQL — Database ──────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: bitvora-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: bitvora
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bitvora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bitvora-network

  nginx:
    image: nginx:alpine
    container_name: bitvora-nginx
    restart: always
    # Removed ports 80 and 443 bindings so it doesn't crash on VPS with Coolify
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./:/var/www/bitvoraexchange:ro
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - bitvora-network

  # ── Cloudflare Tunnel ──────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: bitvora-cloudflared
    restart: always
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bitvora-network

# ═══════════════════════════════════════════════
# Networks & Volumes
# ═══════════════════════════════════════════════

networks:
  bitvora-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local
