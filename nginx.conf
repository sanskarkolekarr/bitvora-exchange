# ════════════════════════════════════════════════════════════
# BITVORA EXCHANGE — Nginx Production Configuration
# Static file serving, reverse proxy, rate limiting, security
# ════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ── Performance ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    client_body_timeout 10;
    send_timeout 2;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript
               application/xml+rss image/svg+xml;

    # ── Security Headers ─────────────────────────────────────
    server_tokens off;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Rate Limiting Zones ──────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=submit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Upstream: FastAPI Backend ─────────────────────────────
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    # ════════════════════════════════════════════════════════
    # Main Server Block
    # ════════════════════════════════════════════════════════

    server {
        listen 80;
        server_name yourdomain.com www.yourdomain.com;
        root /var/www/bitvoraexchange;
        index pages/index.html;

        limit_conn addr 20;

        # ── Static Frontend ──────────────────────────────────
        location / {
            limit_req zone=general burst=20 nodelay;
            try_files $uri $uri/ /pages/index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # ── Static Assets (long cache) ───────────────────────
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # ── Pages ────────────────────────────────────────────
        location /pages/ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # ── API Proxy ────────────────────────────────────────
        location /api/ {
            limit_req zone=general burst=10 nodelay;
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10;
            proxy_send_timeout 30;
            proxy_read_timeout 60;
        }

        # ── Auth endpoints (stricter rate limit) ─────────────
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://backend/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Transaction submission (strictest rate limit) ────
        location /api/transaction/ {
            limit_req zone=submit burst=3 nodelay;
            proxy_pass http://backend/transaction/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Health check (no rate limit) ─────────────────────
        location /api/health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
        }

        # ── Block sensitive files ────────────────────────────
        location ~ /\. { deny all; }
        location ~ /backend/ { deny all; }
        location ~ /\.env { deny all; }
        location ~ /docker-compose { deny all; }
    }
}
